<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | InternPortal</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts — same as register for consistency -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Shared custom CSS -->
  <link rel="stylesheet" href="css/style.css"/>

  <!-- Login-specific CSS -->
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>

  <!-- ========== PAGE WRAPPER ========== -->
  <div class="page-wrapper">

    <!-- Left decorative panel (hidden on small screens) -->
    <div class="side-panel d-none d-lg-flex">
      <div class="side-panel-content">
        <div class="brand-logo">IP</div>
        <h2 class="side-title">Welcome Back.</h2>
        <p class="side-sub">Log in to continue your internship journey and manage your profile.</p>
        <div class="side-dots">
          <span class="dot"></span>
          <span class="dot active"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="form-panel">
      <div class="form-card login-card">

        <!-- Header -->
        <div class="form-header">
          <h1 class="form-title">Login</h1>
          <p class="form-subtitle">Enter your credentials to access your account</p>
        </div>

        <!-- Alert box (hidden by default, shown by JS) -->
        <div id="alertBox" class="alert-box d-none"></div>

        <!-- ======= LOGIN FORM ======= -->
        <!-- NOTE: No <form action="..."> — jQuery AJAX handles submission -->
        <div id="loginForm">

          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control custom-input"
              id="email"
              placeholder="e.g. john@email.com"
            />
            <div class="invalid-feedback" id="emailError"></div>
          </div>

          <!-- Password -->
          <div class="mb-2">
            <label for="password" class="form-label">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                class="form-control custom-input"
                id="password"
                placeholder="Enter your password"
              />
              <!-- Toggle show/hide password -->
              <button type="button" class="pwd-toggle" id="togglePassword" title="Show/hide password">
                <!-- Eye icon (show) -->
                <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                       -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <!-- Eye-off icon (hide) — shown when password is visible -->
                <svg id="eyeHide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="d-none">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                       a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                       M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29
                       m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                       m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7
                       a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
            <div class="invalid-feedback" id="passwordError"></div>
          </div>

          <!-- Remember me (stored in localStorage) -->
          <div class="mb-4 d-flex align-items-center justify-content-between">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe"/>
              <label class="form-check-label remember-label" for="rememberMe">
                Remember me
              </label>
            </div>
          </div>

          <!-- Submit Button -->
          <button
            type="button"
            class="btn btn-primary w-100 submit-btn"
            id="loginBtn"
          >
            <span id="btnText">Login</span>
            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
          </button>

        </div>
        <!-- END loginForm -->

        <!-- Footer link -->
        <p class="form-footer-text">
          Don't have an account?
          <a href="index.html" class="form-link">Register here</a>
        </p>

      </div>
    </div>
    <!-- END form-panel -->

  </div>
  <!-- END page-wrapper -->

  <!-- jQuery (REQUIRED — all AJAX calls use jQuery) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Your custom login JS -->
  <script src="js/login.js"></script>

</body>
</html>
