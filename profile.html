<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile | InternPortal</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts — consistent with register/login -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="css/style.css"/>

  <!-- Profile-specific CSS -->
  <link rel="stylesheet" href="css/profile.css"/>
</head>
<body>

  <!-- ========== TOP NAVBAR ========== -->
  <nav class="portal-nav">
    <div class="nav-inner">
      <!-- Brand -->
      <div class="nav-brand">
        <div class="brand-logo-sm">IP</div>
        <span class="brand-name">InternPortal</span>
      </div>
      <!-- Right side: username + logout -->
      <div class="nav-right">
        <div class="nav-user">
          <div class="user-avatar" id="navAvatar">?</div>
          <span class="nav-username" id="navUsername">Loading...</span>
        </div>
        <button class="btn logout-btn" id="logoutBtn">
          <!-- Logout icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6
                 a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ========== MAIN CONTENT ========== -->
  <div class="profile-page">
    <div class="container-xl">
      <div class="row g-4">

        <!-- ── Left: Profile Card (Avatar + Name summary) ── -->
        <div class="col-lg-3">
          <div class="profile-sidebar">

            <!-- Avatar circle with initials -->
            <div class="avatar-circle" id="avatarCircle">?</div>

            <h2 class="sidebar-name" id="sidebarFullName">—</h2>
            <p class="sidebar-username" id="sidebarUsername">@—</p>

            <!-- Quick info chips -->
            <div class="info-chips">
              <div class="chip" id="chipAge">
                <span class="chip-icon">🎂</span>
                <span id="chipAgeVal">Age: —</span>
              </div>
              <div class="chip" id="chipGender">
                <span class="chip-icon">👤</span>
                <span id="chipGenderVal">Gender: —</span>
              </div>
              <div class="chip" id="chipContact">
                <span class="chip-icon">📞</span>
                <span id="chipContactVal">Contact: —</span>
              </div>
            </div>

            <!-- Profile completeness bar -->
            <div class="completeness-wrap">
              <div class="completeness-label">
                <span>Profile Completeness</span>
                <span id="completenessPct">0%</span>
              </div>
              <div class="progress completeness-bar">
                <div class="progress-bar" id="completenessBar" role="progressbar"
                  style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- ── Right: Profile Form ── -->
        <div class="col-lg-9">
          <div class="profile-form-card">

            <!-- Card header with tabs -->
            <div class="profile-card-header">
              <h3 class="profile-card-title">Profile Details</h3>
              <p class="profile-card-sub">
                This information is stored in MongoDB. Fill it in and click <strong>Save Profile</strong>.
              </p>
            </div>

            <!-- Alert box -->
            <div id="alertBox" class="alert-box d-none"></div>

            <!-- Loading overlay (shown while fetching data) -->
            <div id="loadingOverlay" class="loading-overlay">
              <div class="spinner-border text-danger" role="status"></div>
              <p>Loading your profile...</p>
            </div>

            <!-- ======= PROFILE FORM ======= -->
            <!-- NOTE: No <form action="..."> — jQuery AJAX handles all requests -->
            <div id="profileForm">

              <!-- Row 1: Full Name + Username (readonly) -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label for="fullName" class="form-label">Full Name</label>
                  <input type="text" class="form-control custom-input"
                    id="fullName" placeholder="e.g. John Doe"/>
                </div>
                <div class="col-md-6">
                  <label for="usernameDisplay" class="form-label">
                    Username
                    <span class="readonly-badge">read-only</span>
                  </label>
                  <input type="text" class="form-control custom-input readonly-input"
                    id="usernameDisplay" readonly/>
                </div>
              </div>

              <!-- Row 2: Age + Date of Birth -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label for="age" class="form-label">Age</label>
                  <input type="number" class="form-control custom-input"
                    id="age" placeholder="e.g. 21" min="1" max="120"/>
                </div>
                <div class="col-md-6">
                  <label for="dob" class="form-label">Date of Birth</label>
                  <input type="date" class="form-control custom-input" id="dob"/>
                </div>
              </div>

              <!-- Row 3: Contact + Gender -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label for="contact" class="form-label">Contact Number</label>
                  <input type="tel" class="form-control custom-input"
                    id="contact" placeholder="e.g. 9876543210"/>
                </div>
                <div class="col-md-6">
                  <label for="gender" class="form-label">Gender</label>
                  <select class="form-select custom-input" id="gender">
                    <option value="">— Select Gender —</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Non-binary">Non-binary</option>
                    <option value="Prefer not to say">Prefer not to say</option>
                  </select>
                </div>
              </div>

              <!-- Row 4: Address (full width) -->
              <div class="row g-3 mb-3">
                <div class="col-12">
                  <label for="address" class="form-label">Address</label>
                  <textarea class="form-control custom-input"
                    id="address" rows="2"
                    placeholder="e.g. 12 Main Street, Chennai, Tamil Nadu"></textarea>
                </div>
              </div>

              <!-- Row 5: Bio (full width) -->
              <div class="row g-3 mb-4">
                <div class="col-12">
                  <label for="bio" class="form-label">Short Bio</label>
                  <textarea class="form-control custom-input"
                    id="bio" rows="3"
                    placeholder="Tell us a little about yourself..."></textarea>
                </div>
              </div>

              <!-- Action Buttons -->
              <div class="form-actions">
                <button type="button" class="btn submit-btn" id="saveBtn">
                  <span id="saveBtnText">Save Profile</span>
                  <span id="saveBtnSpinner"
                    class="spinner-border spinner-border-sm d-none ms-2" role="status">
                  </span>
                </button>
                <button type="button" class="btn reset-btn" id="resetBtn">
                  Reset Changes
                </button>
              </div>

            </div>
            <!-- END profileForm -->

          </div>
        </div>
        <!-- END col-lg-9 -->

      </div>
    </div>
  </div>
  <!-- END profile-page -->

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Profile JS -->
  <script src="js/profile.js"></script>

</body>
</html>
