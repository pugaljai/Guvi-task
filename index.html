<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | InternPortal</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- ========== PAGE WRAPPER ========== -->
  <div class="page-wrapper">

    <!-- Left decorative panel (hidden on small screens) -->
    <div class="side-panel d-none d-lg-flex">
      <div class="side-panel-content">
        <div class="brand-logo">IP</div>
        <h2 class="side-title">Start Your Journey.</h2>
        <p class="side-sub">Create an account and take your first step toward your dream internship.</p>
        <div class="side-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="form-panel">
      <div class="form-card">

        <!-- Header -->
        <div class="form-header">
          <h1 class="form-title">Create Account</h1>
          <p class="form-subtitle">Fill in the details below to register</p>
        </div>

        <!-- Alert box (hidden by default, shown by JS) -->
        <div id="alertBox" class="alert-box d-none"></div>

        <!-- ======= REGISTER FORM ======= -->
        <!-- NOTE: No <form action="..."> — jQuery AJAX handles submission -->
        <div id="registerForm">

          <!-- Username -->
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              class="form-control custom-input"
              id="username"
              placeholder="e.g. john_doe"
            />
            <div class="invalid-feedback" id="usernameError"></div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control custom-input"
              id="email"
              placeholder="e.g. john@email.com"
            />
            <div class="invalid-feedback" id="emailError"></div>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control custom-input"
              id="password"
              placeholder="Minimum 6 characters"
            />
            <div class="invalid-feedback" id="passwordError"></div>
          </div>

          <!-- Confirm Password -->
          <div class="mb-4">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input
              type="password"
              class="form-control custom-input"
              id="confirmPassword"
              placeholder="Re-enter your password"
            />
            <div class="invalid-feedback" id="confirmPasswordError"></div>
          </div>

          <!-- Submit Button -->
          <button
            type="button"
            class="btn btn-primary w-100 submit-btn"
            id="registerBtn"
          >
            <span id="btnText">Register</span>
            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
          </button>

        </div>
        <!-- END registerForm -->

        <!-- Footer link -->
        <p class="form-footer-text">
          Already have an account?
          <a href="login.html" class="form-link" id="loginHereBtn">Login here</a>
        </p>

      </div>
    </div>
    <!-- END form-panel -->

  </div>
  <!-- END page-wrapper -->

  <!-- jQuery (REQUIRED — all AJAX calls use jQuery) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Your custom register JS -->
  <script src="js/register.js"></script>

</body>
</html>
